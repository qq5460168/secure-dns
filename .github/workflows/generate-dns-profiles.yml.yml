name: Generate DNS Profiles

on:
  push:
    branches:
      - main
    paths:
      - 'vendors-config/*.txt'
      - 'scripts/generate-profiles-from-txt.js'
  pull_request:
    branches:
      - main
    paths:
      - 'vendors-config/*.txt'
      - 'scripts/generate-profiles-from-txt.js'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate DNS profiles
        run: |
          echo "🚀 Generating DNS profiles..."
          npm run generate
          echo "✅ DNS profiles generated successfully!"

      - name: Check generated files
        run: |
          echo "📋 Generated profiles:"
          ls -lh profiles/*.mobileconfig 2>/dev/null || echo "No profiles generated"

      - name: Upload profiles as artifact
        uses: actions/upload-artifact@v3
        with:
          name: dns-profiles
          path: profiles/*.mobileconfig
          retention-days: 30

      - name: Commit and push changes (on push)
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git add profiles/*.mobileconfig
            git commit -m "🤖 Auto-generate DNS profiles from vendor configs"
            git push origin main
          fi

      - name: Comment on PR (on pull_request)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const profilesDir = 'profiles';
            let profiles = [];
            
            if (fs.existsSync(profilesDir)) {
              profiles = fs.readdirSync(profilesDir)
                .filter(f => f.endsWith('.mobileconfig'))
                .map(f => `- \`${f}\``);
            }
            
            let comment = '✅ **DNS Profiles Generated Successfully!**\n\n';
            comment += 'The following profiles have been generated and are ready for review:\n\n';
            
            if (profiles.length > 0) {
              comment += profiles.join('\n') + '\n';
            } else {
              comment += 'No new profiles generated.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });